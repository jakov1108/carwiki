<html lang="hr" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="dns-prefetch" href="https://hjvuiqozcxuvwaedmgkm.supabase.co" />
    <link rel="preconnect" href="https://hjvuiqozcxuvwaedmgkm.supabase.co" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Auto Wiki je enciklopedija automobila s modelima, generacijama, motornim varijantama, specifikacijama i blog člancima." />
    <meta property="og:title" content="Auto Wiki - Automotive Encyclopedia" />
    <meta property="og:description" content="Auto Wiki je enciklopedija automobila s modelima, generacijama, motornim varijantama, specifikacijama i blog člancima." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#f1f5f9" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Auto Wiki - Automotive Encyclopedia</title>
    <script>
      // Prevent flash of wrong theme
      (function() {
        const saved = localStorage.getItem('autowiki-theme');
        if (saved === 'light') {
          document.documentElement.classList.remove('dark');
          document.documentElement.classList.add('light');
        } else if (saved === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
